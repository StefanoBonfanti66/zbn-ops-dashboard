name: Refresh dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Full refresh pipeline (discover → sync → build)
        run: node scripts/refresh-dashboard.mjs --ci
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data [skip ci]"
          git push "https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git"
