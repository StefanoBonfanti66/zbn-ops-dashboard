<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZBN Ops Dashboard</title>
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
  <header class="wrap">
    <h1>ZBN Ops Dashboard</h1>
    <p>Follow-up, portfolio e rischio commerciale.</p>
  </header>

  <main class="wrap stack">
    <section>
      <h2>KPI</h2>
      <div id="kpi-grid" class="grid"></div>
    </section>

    <section>
      <h2>Follow-up</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Progetto</th>
              <th>Titolo</th>
              <th>Stato</th>
              <th>Next review</th>
              <th>Next action</th>
            </tr>
          </thead>
          <tbody id="followup-body"></tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>Flag commerciali</h2>
      <div id="flags-list" class="stack"></div>
    </section>
  </main>

  <script src="./assets/app.js" defer></script>
</body>
</html>
