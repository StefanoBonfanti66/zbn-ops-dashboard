name: Refresh dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate summary
        run: |
          node scripts/generate-summary.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/portfolio-summary.json
          git diff --cached --quiet || git commit -m "chore: refresh portfolio summary"
          git push
